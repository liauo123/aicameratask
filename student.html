<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<title>AI 多專案學生任務 V2.1</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- TensorFlow.js 與 Teachable Machine 三種專案 -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/audio@0.8/dist/teachablemachine-audio.min.js"></script>

<style>
:root{
  --primary:#2563eb;--primary-dark:#1d4ed8;--success:#16a34a;
  --danger:#dc2626;--bg:#f3f6fb;--card:#fff;--text:#172033;
  --muted:#64748b;--border:#dce4f0;--radius:20px
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--text);background:var(--bg)}
body{min-height:100dvh;display:flex;justify-content:center}
button,input{font:inherit}
.app{width:min(100%,760px);min-height:100dvh;padding:max(16px,env(safe-area-inset-top)) 16px max(22px,env(safe-area-inset-bottom))}
.header{background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border-radius:var(--radius);padding:20px;box-shadow:0 12px 28px rgba(37,99,235,.22);margin-bottom:14px}
.header h1{margin:0 0 8px;font-size:clamp(1.4rem,5vw,2rem)}
.header p{margin:0;line-height:1.6;opacity:.95}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.07);margin-top:14px}
.hidden{display:none!important}
label{display:block;color:var(--muted);font-size:.92rem;margin:10px 0 7px}
input{width:100%;min-height:48px;border:1px solid var(--border);border-radius:14px;padding:0 12px;background:#fff;color:var(--text)}
button{min-height:50px;border:0;border-radius:15px;padding:0 16px;cursor:pointer;font-weight:800}
.primary{background:var(--primary);color:#fff}.primary:active{background:var(--primary-dark)}
.secondary{background:#e8eef8;color:#24324b}.full{width:100%;margin-top:12px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}

.number-select-title{
  margin:8px 0 12px;
  font-size:1.1rem;
  font-weight:900;
  text-align:center;
}
.number-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-top:10px;
}
.number-btn{
  min-height:54px;
  border:2px solid #cbd5e1;
  border-radius:14px;
  background:#fff;
  color:#1e293b;
  font-size:1.15rem;
  font-weight:900;
}
.number-btn.selected{
  border-color:#2563eb;
  background:#2563eb;
  color:#fff;
  box-shadow:0 6px 16px rgba(37,99,235,.22);
}
.selected-number{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  background:#eff6ff;
  color:#1d4ed8;
  text-align:center;
  font-weight:800;
}
.game-waiting{text-align:center;background:linear-gradient(135deg,#faf5ff,#eef2ff);border:2px solid #c4b5fd}
.game-waiting .waiting-icon{font-size:64px;animation:waitingPulse 1.4s ease-in-out infinite}.game-waiting h2{color:#6d28d9;margin:8px 0}.game-number{font-size:30px;font-weight:900;color:#6d28d9;margin:10px 0}.game-note{color:#64748b;line-height:1.7}
@keyframes waitingPulse{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.12);opacity:1}}
.rank-display{font-size:clamp(34px,11vw,64px);font-weight:1000;color:#6d28d9;margin:12px 0;padding:14px;border-radius:18px;background:linear-gradient(135deg,#fef3c7,#faf5ff)}
@media(max-width:430px){
  .number-grid{grid-template-columns:repeat(3,1fr)}
}

.status{display:flex;align-items:flex-start;gap:10px;margin-top:14px;padding:12px 14px;border-radius:14px;background:#eff6ff;color:#1e40af;font-weight:700;white-space:pre-wrap;word-break:break-word}
.status::before{content:"";width:12px;height:12px;border-radius:50%;background:var(--primary);margin-top:4px;flex:none}
.status.success{background:#ecfdf3;color:#166534}.status.success::before{background:var(--success)}
.status.error{background:#fef2f2;color:#991b1b}.status.error::before{background:var(--danger)}
.task-title{font-size:1.45rem;font-weight:900;margin-bottom:6px}.meta{color:var(--muted);line-height:1.6}
.target{text-align:center;background:linear-gradient(135deg,#eff6ff,#dbeafe);border:2px solid #93c5fd;border-radius:18px;padding:16px;margin-bottom:12px}
.target small{display:block;color:#475569}.target strong{display:block;font-size:30px;color:#1d4ed8;margin-top:5px}
.progress-label{display:flex;justify-content:space-between;color:var(--muted);margin-bottom:7px}
.progress{height:14px;background:#e7edf6;border-radius:999px;overflow:hidden;margin-bottom:14px}
.progress>div{height:100%;width:0;background:var(--success);transition:width .2s}
.stage{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:20px;background:#0f172a;display:grid;place-items:center}
#imageVideo{width:100%;height:100%;object-fit:cover}
#poseCanvas{width:100%;height:100%;object-fit:cover;display:block}
.guide{position:absolute;inset:9%;border:3px dashed rgba(255,255,255,.8);border-radius:24px;pointer-events:none}
.guide span{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);white-space:nowrap;background:rgba(15,23,42,.75);color:#fff;border-radius:999px;padding:8px 14px;font-size:.9rem}
.audio-stage{min-height:280px;background:linear-gradient(145deg,#0f172a,#1e3a8a);color:#fff;border-radius:20px;display:grid;place-items:center;text-align:center;padding:25px}
.audio-icon{font-size:72px}.audio-level{font-size:1.1rem;margin-top:12px}
.overlay{position:absolute;left:10px;right:10px;bottom:10px;background:rgba(15,23,42,.82);color:#fff;border-radius:14px;padding:11px}
.overlay-main{font-size:1.1rem;font-weight:900}
@keyframes taskResultFlash{
  0%,100%{background:rgba(15,23,42,.82);box-shadow:none;transform:scale(1)}
  25%,75%{background:rgba(22,163,74,.96);box-shadow:0 0 0 5px rgba(34,197,94,.25);transform:scale(1.015)}
  50%{background:rgba(15,23,42,.82);box-shadow:none;transform:scale(1)}
}
.overlay.task-success-flash{
  animation:taskResultFlash .8s ease-in-out 1;
}
.capture-feedback{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;pointer-events:none;visibility:hidden;opacity:0;color:#fff;text-align:center;text-shadow:0 3px 12px rgba(0,0,0,.45)}
.capture-feedback-icon{font-size:clamp(90px,24vw,170px);font-weight:1000;line-height:1}.capture-feedback-text{font-size:clamp(34px,10vw,68px);font-weight:1000;letter-spacing:.08em}
.capture-feedback.success{visibility:visible;animation:successScreenFlash 1s ease-out 1}
.capture-feedback.failure{visibility:visible;animation:failureScreenFlash 1s ease-out 1}
@keyframes successScreenFlash{
  0%{opacity:0;background:rgba(22,163,74,0)}
  12%{opacity:1;background:rgba(22,163,74,.88)}
  30%{opacity:.25;background:rgba(34,197,94,.28)}
  48%{opacity:1;background:rgba(22,163,74,.9)}
  72%{opacity:.9;background:rgba(22,163,74,.75)}
  100%{opacity:0;background:rgba(22,163,74,0)}
}
@keyframes failureScreenFlash{
  0%{opacity:0;background:rgba(220,38,38,0)}
  12%{opacity:1;background:rgba(220,38,38,.9)}
  30%{opacity:.25;background:rgba(239,68,68,.3)}
  48%{opacity:1;background:rgba(185,28,28,.92)}
  72%{opacity:.9;background:rgba(220,38,38,.78)}
  100%{opacity:0;background:rgba(220,38,38,0)}
}
.prediction{margin-top:14px;display:grid;gap:9px}
.pred-row{display:grid;grid-template-columns:minmax(82px,130px) 1fr 50px;align-items:center;gap:9px}
.pred-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.pred-bar{height:13px;background:#e7edf6;border-radius:999px;overflow:hidden}
.pred-fill{height:100%;width:0;background:var(--primary);transition:width .1s}
.pred-value{text-align:right;font-weight:700}
.hold{margin-top:14px}.hold-head{display:flex;justify-content:space-between;color:var(--muted);margin-bottom:7px}
.hold-bar{height:18px;background:#e7edf6;border-radius:999px;overflow:hidden}.hold-fill{height:100%;width:0;background:var(--success)}
.item{padding:10px 12px;border:1px solid var(--border);border-radius:11px;display:flex;justify-content:space-between;margin-top:8px}
.item.done{background:#ecfdf5;border-color:#86efac;color:#166534}
.complete{text-align:center;animation:pop .45s ease}.complete .icon{font-size:72px}
@keyframes pop{0%{transform:scale(.75);opacity:0}100%{transform:scale(1);opacity:1}}
.teaching-result{
  margin-top:14px;
  padding:18px;
  border-radius:18px;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  border:2px solid #93c5fd;
  text-align:center;
}
.teaching-result small{display:block;color:#475569;margin-bottom:4px}
.teaching-name-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:4px;
}
.teaching-result strong{display:block;color:#1d4ed8;font-size:34px}
.speak-btn{
  width:46px;
  height:46px;
  min-height:46px;
  border-radius:50%;
  border:1px solid #93c5fd;
  background:#fff;
  color:#1d4ed8;
  font-size:22px;
  padding:0;
  display:grid;
  place-items:center;
}
.speak-btn:disabled{
  opacity:.45;
  cursor:not-allowed;
}
.teaching-result span{display:block;color:#334155;margin-top:5px}

.teaching-page{margin-top:0}
.teaching-mode-title{display:none!important}
#recognitionStatus{display:none!important}
.teaching-name-card{background:#fff;border:2px solid #cbd5e1;border-radius:16px;padding:14px;text-align:center;margin-bottom:14px}
.teaching-name-row{display:flex;align-items:center;justify-content:center;gap:10px}
.teaching-name-card strong{color:#1d4ed8;font-size:32px;line-height:1.2}
@keyframes teachingSuccessFlash{
  0%,100%{background:#fff;border-color:#cbd5e1;box-shadow:none;transform:scale(1)}
  25%,75%{background:#dcfce7;border-color:#22c55e;box-shadow:0 0 0 5px rgba(34,197,94,.18);transform:scale(1.015)}
  50%{background:#fff;border-color:#cbd5e1;box-shadow:none;transform:scale(1)}
}
.teaching-name-card.success-flash{
  animation:teachingSuccessFlash .8s ease-in-out 1;
}
.teaching-camera-card{background:#fff;border:2px solid #cbd5e1;border-radius:18px;padding:12px}
.teaching-camera-card .stage{aspect-ratio:3/4;border-radius:14px}
.teaching-camera-card .guide{inset:10%}
.teaching-camera-card .overlay{left:8px;right:8px;bottom:8px}

/* iPhone／iPad 響應式顯示：避免相機區過高把按鈕推出畫面 */
html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.app{
  width:min(100%,960px);
  max-width:100%;
}
.stage,
.teaching-camera-card .stage{
  aspect-ratio:auto;
  height:clamp(300px,58svh,620px);
  max-height:calc(100svh - 250px);
}
#imageVideo,
#poseCanvas{
  width:100%;
  height:100%;
  object-fit:cover;
}
.card,
.teaching-camera-card,
.teaching-name-card,
.target,
.stage{
  max-width:100%;
}
.row button{
  min-width:0;
  white-space:normal;
}

/* iPad 直向與橫向 */
@media (min-width:541px) and (max-width:1024px){
  .app{
    padding:max(12px,env(safe-area-inset-top))
            max(14px,env(safe-area-inset-right))
            max(18px,env(safe-area-inset-bottom))
            max(14px,env(safe-area-inset-left));
  }
  .card{padding:14px;margin-top:10px}
  .stage,
  .teaching-camera-card .stage{
    height:clamp(360px,60svh,650px);
    max-height:calc(100svh - 230px);
  }
}

/* iPhone */
@media(max-width:540px){
  .app{
    padding:max(7px,env(safe-area-inset-top))
            max(7px,env(safe-area-inset-right))
            max(10px,env(safe-area-inset-bottom))
            max(7px,env(safe-area-inset-left));
  }
  .card{
    padding:8px;
    margin-top:6px;
    border-radius:14px;
  }
  .target{
    padding:8px;
    margin-bottom:7px;
    border-radius:13px;
  }
  .target strong{
    font-size:clamp(22px,7vw,28px);
    margin-top:2px;
  }
  .progress{margin-bottom:7px}
  .teaching-name-card{
    padding:8px;
    margin-bottom:7px;
    border-radius:13px;
  }
  .teaching-name-card strong{
    font-size:clamp(23px,7vw,30px);
  }
  .teaching-camera-card{
    padding:6px;
    border-radius:14px;
  }
  .stage,
  .teaching-camera-card .stage{
    height:clamp(280px,56svh,500px);
    max-height:calc(100svh - 205px);
    border-radius:13px;
  }
  .guide{
    inset:8%;
    border-width:2px;
    border-radius:18px;
  }
  .guide span{
    bottom:7px;
    padding:6px 10px;
    font-size:.78rem;
  }
  .overlay{
    left:6px;
    right:6px;
    bottom:6px;
    padding:8px;
    border-radius:10px;
  }
  .overlay-main{font-size:.92rem}
  .row{
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:6px;
    margin-top:7px;
  }
  .row button{
    min-height:44px;
    padding:0 6px;
    font-size:.88rem;
  }
  #completeActions{
    grid-template-columns:1fr 1fr;
  }
  .pred-row{grid-template-columns:76px 1fr 42px}
}

/* iPhone 橫向／低高度裝置 */
@media(max-height:600px) and (orientation:landscape){
  .app{padding-top:6px;padding-bottom:8px}
  .card{padding:8px;margin-top:5px}
  .target{padding:6px;margin-bottom:5px}
  .target small{font-size:.75rem}
  .target strong{font-size:21px}
  .stage,
  .teaching-camera-card .stage{
    height:calc(100svh - 145px);
    min-height:210px;
    max-height:430px;
  }
  .row{margin-top:5px}
  .row button{min-height:40px}
}
</style>
</head>
<body>
<main class="app">
  <section id="loadCard" class="card">
    <h2>載入任務</h2>
    <label for="taskIdInput">任務代碼</label>
    <input id="taskIdInput" placeholder="掃描 QR Code 會自動帶入">
    <button id="loadBtn" class="primary full">載入任務</button>
    <div id="loadStatus" class="status">等待任務資料。</div>
  </section>

  <section id="joinCard" class="card hidden">
    <div id="taskTitle" class="task-title"></div>
    <div id="taskMeta" class="meta"></div>

    <div class="number-select-title">請選擇學生編號</div>
    <div id="studentNumberGrid" class="number-grid">
      <button type="button" class="number-btn" data-student-number="1">1</button>
      <button type="button" class="number-btn" data-student-number="2">2</button>
      <button type="button" class="number-btn" data-student-number="3">3</button>
      <button type="button" class="number-btn" data-student-number="4">4</button>
      <button type="button" class="number-btn" data-student-number="5">5</button>
      <button type="button" class="number-btn" data-student-number="6">6</button>
      <button type="button" class="number-btn" data-student-number="7">7</button>
      <button type="button" class="number-btn" data-student-number="8">8</button>
      <button type="button" class="number-btn" data-student-number="9">9</button>
      <button type="button" class="number-btn" data-student-number="10">10</button>
      <button type="button" class="number-btn" data-student-number="11">11</button>
      <button type="button" class="number-btn" data-student-number="12">12</button>
      <button type="button" class="number-btn" data-student-number="13">13</button>
      <button type="button" class="number-btn" data-student-number="14">14</button>
      <button type="button" class="number-btn" data-student-number="15">15</button>
    </div>

    <div id="selectedNumberText" class="selected-number">尚未選擇編號</div>

    <button id="startBtn" class="primary full" disabled>開始任務</button>
    <div id="joinStatus" class="status hidden"></div>
  </section>

  <section id="gameWaitingCard" class="card game-waiting hidden">
    <div class="waiting-icon">🎮</div>
    <h2 id="gameWaitingTitle">等待教師同意</h2>
    <div id="gameWaitingNumber" class="game-number"></div>
    <p id="gameWaitingMessage" class="game-note">請留在此頁面。教師同意並按下開始後，題目會自動出現。</p>
    <div id="gameWaitingStatus" class="status">加入申請已送出。</div>
  </section>

  <section id="taskCard" class="card hidden">
    <div id="normalTaskHeader">
      <div class="progress-label"><b>任務進度</b><span id="progressText">0 / 0</span></div>
      <div class="progress"><div id="progressFill"></div></div>

      <div id="normalTargetCard" class="target">
        <small id="targetHint">目前指定內容</small>
        <div class="teaching-name-row">
          <strong id="currentTarget">—</strong>
          <button id="speakEvaluationTargetBtn" class="speak-btn" type="button" aria-label="播放物品名稱" title="播放物品名稱" disabled>🔊</button>
        </div>
      </div>

      <div id="advancedPromptCard" class="target hidden">
        <small>請聽語音說明，找出正確物品</small>
        <strong>🔊 語音題目</strong>
        <button id="repeatAdvancedPromptBtn" class="primary full" type="button">重複聽說明</button>
      </div>
    </div>

    <div id="teachingHeader" class="teaching-page hidden">
      <div class="teaching-mode-title">教學模式</div>
      <div class="teaching-name-card">
        <div class="teaching-name-row">
          <strong id="teachingNameTop">等待辨識…</strong>
          <button id="speakTeachingBtnTop" class="speak-btn" type="button" aria-label="播放物品名稱" title="播放物品名稱" disabled>🔊</button>
          <button id="speakDescriptionBtnTop" class="speak-btn" type="button" aria-label="播放物品說明" title="播放物品說明" disabled>說明</button>
        </div>
      </div>
      <div class="teaching-camera-card">
              </div>
    </div>

    <div id="imageStage" class="stage hidden">
      <video id="imageVideo" autoplay muted playsinline></video>
      <canvas id="imageCanvas" width="224" height="224" hidden></canvas>
      <div class="guide"><span>請將物品放入框內</span></div>
      <div class="overlay"><div id="imageOverlay" class="overlay-main">等待相機畫面…</div></div>
    </div>

    <div id="poseStage" class="stage hidden">
      <canvas id="poseCanvas"></canvas>
      <div class="guide"><span>請讓全身進入框內</span></div>
      <div class="overlay"><div id="poseOverlay" class="overlay-main">等待姿勢畫面…</div></div>
    </div>

    <div id="audioStage" class="audio-stage hidden">
      <div>
        <div class="audio-icon">🎤</div>
        <h2>請發出指定聲音</h2>
        <div id="audioOverlay" class="audio-level">等待麥克風…</div>
      </div>
    </div>

    <div id="teachingResult" class="teaching-result hidden">
      <small>鏡頭目前辨識到</small>
      <div class="teaching-name-row">
        <strong id="teachingName">等待辨識…</strong>
        <button id="speakTeachingBtn" class="speak-btn" type="button" aria-label="播放物品名稱" title="播放物品名稱" disabled>🔊</button>
        <button id="speakDescriptionBtn" class="speak-btn" type="button" aria-label="播放物品說明" title="播放物品說明" disabled>說明</button>
      </div>
      <span id="teachingConfidence">信心值：0%</span>
    </div>

    <div id="holdSection" class="hold">
      <div class="hold-head"><span>連續辨識進度</span><span id="holdText">0 / 10</span></div>
      <div class="hold-bar"><div id="holdFill" class="hold-fill"></div></div>
    </div>

    <div id="predictionList" class="prediction"></div>

    <div class="row">
      <button id="captureBtn" class="primary hidden">拍照辨識</button>
      <button id="switchBtn" class="secondary hidden">切換鏡頭</button>
    </div>

    <div id="recognitionStatus" class="status">等待辨識。</div>
    <div id="itemList"></div>
  </section>

  <section id="completeCard" class="card hidden complete">
    <div id="completeIcon" class="icon">🎉</div>
    <h2 id="completeTitle">任務完成！</h2>
    <div id="rankDisplay" class="rank-display hidden"></div>
    <p id="completeMessage"></p>
    <div id="completeActions" class="row">

function playTaskSuccessSound(){
  if(isTeachingMode())return;

  try{
    const AudioContextClass=window.AudioContext||window.webkitAudioContext;
    if(!AudioContextClass)return;

    const ctx=new AudioContextClass();
    const now=ctx.currentTime;
    const gain=ctx.createGain();
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(0.0001,now);
    gain.gain.exponentialRampToValueAtTime(0.28,now+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001,now+0.7);

    const first=ctx.createOscillator();
    first.type="sine";
    first.frequency.setValueAtTime(523.25,now);
    first.connect(gain);
    first.start(now);
    first.stop(now+0.2);

    const second=ctx.createOscillator();
    second.type="sine";
    second.frequency.setValueAtTime(659.25,now+0.2);
    second.connect(gain);
    second.start(now+0.2);
    second.stop(now+0.42);

    const third=ctx.createOscillator();
    third.type="sine";
    third.frequency.setValueAtTime(783.99,now+0.42);
    third.connect(gain);
    third.start(now+0.42);
    third.stop(now+0.7);

    setTimeout(()=>{
      try{ctx.close()}catch(e){}
    },850);
  }catch(e){
    console.warn("成功音效播放失敗",e);
  }
}

function gameSeededRandom(seedText){
  let seed=2166136261;
  for(let i=0;i<seedText.length;i++){
    seed^=seedText.charCodeAt(i);
    seed=Math.imul(seed,16777619);
  }
  return ()=>{
    seed+=0x6D2B79F5;
    let value=seed;
    value=Math.imul(value^(value>>>15),value|1);
    value^=value+Math.imul(value^(value>>>7),value|61);
    return ((value^(value>>>14))>>>0)/4294967296;
  };
}

function shuffleGameTargetsForStudent(){

  const items=[...task.targetClasses];

  const startToken=startedAt&&typeof startedAt.toMillis==="function"
    ? startedAt.toMillis()
    : (startedAt?.seconds||"");
  const random=gameSeededRandom(`${taskId}|${selectedStudentNumber}|${startToken}`);
  for(let i=items.length-1;i>0;i--){
    const j=Math.floor(random()*(i+1));
    [items[i],items[j]]=[items[j],items[i]];
  }
  task.targetClasses=items;
  gameTargetsShuffled=true;
}

async function detectProjectType(modelURL){
  const response=await fetch(modelURL+"metadata.json",{cache:"no-store"});
  if(!response.ok)throw new Error("無法讀取 metadata.json");
  const data=await response.json();
  const text=JSON.stringify(data).toLowerCase();

  if(text.includes("@teachablemachine/pose") || text.includes('"pose"')) return {type:"pose",metadata:data};
  if(text.includes("@teachablemachine/audio") || text.includes('"audio"') || text.includes("speechcommands")) return {type:"audio",metadata:data};
  if(text.includes("@teachablemachine/image") || text.includes('"image"')) return {type:"image",metadata:data};

  // 舊版 metadata 常沒有明確 type，以欄位特徵判斷
  if(data.wordLabels || data.backgroundNoise || data.sampleRate) return {type:"audio",metadata:data};
  if(data.poseModel || data.poseLabels) return {type:"pose",metadata:data};
  return {type:"image",metadata:data};
}

async function loadTask(){
  taskId=$("taskIdInput").value.trim();
  if(!taskId)return setStatus("loadStatus","請輸入任務代碼。","error");

  $("loadBtn").disabled=true;
  setStatus("loadStatus","正在讀取 Firebase 任務…");
  try{
    await ensureAuth();
    const snap=await db.collection("tasks").doc(taskId).get();
    if(!snap.exists)throw new Error("找不到此任務");
    task={id:snap.id,...snap.data()};
    if(task.status!=="active")throw new Error("任務目前未開放");
    if(!task.modelURL)throw new Error("任務沒有模型網址");
    if(!Array.isArray(task.targetClasses)||!task.targetClasses.length)throw new Error("任務沒有指定類別");

    task.modelURL=norm(task.modelURL);
    task.threshold=Number(task.threshold||0.85);
    task.requiredConsecutiveFrames=Number(task.requiredConsecutiveFrames||10);
    task.taskMode=task.taskMode||task.orderMode||"task";
    gameTargetsShuffled=false;
    task.classDescriptions=task.classDescriptions&&typeof task.classDescriptions==="object"
      ? task.classDescriptions
      : {};

    const detected=await detectProjectType(task.modelURL);
    projectType=detected.type;
    metadata=detected.metadata;

    const typeName={image:"圖片專案",audio:"音訊專案",pose:"姿勢專案"}[projectType];
    $("taskTitle").textContent=task.title||"未命名任務";
    $("taskMeta").textContent=task.taskMode==="teaching"
      ? `專案類型：${typeName}｜教學模式：拍照後顯示名稱與說明`
      : task.taskMode==="advanced"
        ? `專案類型：${typeName}｜進階評量：依語音說明找出正確物品`
        : task.taskMode==="game"
          ? `多人尋物遊戲｜教師開始後，每位學生會收到不同的隨機物品順序`
          : `專案類型：${typeName}｜順序：${task.targetClasses.join(" → ")}`;
    if(task.taskMode==="teaching"){
      $("joinCard").classList.add("hidden");
      setStatus("loadStatus","教學模式載入成功，正在開啟鏡頭…","success");
      await startTeachingModeDirectly();
    }else{
      if(isGameMode()&&task.gameStatus!=="lobby"){
        throw new Error(task.gameStatus==="active"?"遊戲已經開始，無法再加入":"這場遊戲已經結束");
      }
      selectedStudentNumber="";
      document.querySelectorAll(".number-btn").forEach(button=>{
        button.classList.remove("selected");
      });
      $("selectedNumberText").textContent="尚未選擇編號";
      $("startBtn").disabled=true;
      $("startBtn").textContent=isGameMode()?"送出加入申請":"開始任務";

      $("joinCard").classList.remove("hidden");
      if(isGameMode()){
        listenGameSeats();
        setStatus("loadStatus","遊戲載入成功，請選擇學生編號後送出加入申請。","success");
      }else{
        setStatus("loadStatus","任務載入成功，已辨識為「"+typeName+"」。","success");
      }
    }
  }catch(error){
    console.error(error);

function listenGameSeats(){
  if(gameSeatsUnsub)gameSeatsUnsub();
  gameSeatsUnsub=db.collection("tasks").doc(taskId).collection("gamePlayers").onSnapshot(snap=>{
    const occupied=new Set();
    snap.docs.forEach(doc=>{
      const data=doc.data();
      if(["pending","approved","playing","completed"].includes(data.status))occupied.add(String(data.studentNumber||doc.id));
    });
    document.querySelectorAll(".number-btn").forEach(button=>{
      const taken=occupied.has(button.dataset.studentNumber);
      button.disabled=taken;
      button.style.opacity=taken?".38":"1";
      button.title=taken?"此號碼已被其他學生選取":"";
      if(taken&&button.dataset.studentNumber===selectedStudentNumber){
        selectedStudentNumber="";button.classList.remove("selected");
        $("selectedNumberText").textContent="此號碼已被選取，請重新選擇";
        $("startBtn").disabled=true;
      }
    });
  });
}

async function requestGameJoin(){
  if(!selectedStudentNumber)return setStatus("joinStatus","請先選擇學生編號。","error");
  $("startBtn").disabled=true;
  setStatus("joinStatus","正在送出加入申請…");
  try{
    const currentUser=await ensureAuth();
    const taskRef=db.collection("tasks").doc(taskId);
    const playerRef=taskRef.collection("gamePlayers").doc(selectedStudentNumber);
    await db.runTransaction(async tx=>{
      const [taskSnap,playerSnap]=await Promise.all([tx.get(taskRef),tx.get(playerRef)]);
      if(!taskSnap.exists||taskSnap.data().gameStatus!=="lobby")throw new Error("遊戲已開始或已結束，無法加入");
      if(playerSnap.exists&&["pending","approved","playing","completed"].includes(playerSnap.data().status)){
        throw new Error("此學生編號已被選取，請改選其他號碼");
      }
      tx.set(playerRef,{
        studentNumber:selectedStudentNumber,
        studentName:"學生 "+selectedStudentNumber,
        studentUid:currentUser.uid,
        status:"pending",
        rank:null,
        joinedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    });
    gamePlayerRef=playerRef;gamePlayerStatus="pending";gameRank=0;
    if(gameSeatsUnsub){gameSeatsUnsub();gameSeatsUnsub=null}
    $("joinCard").classList.add("hidden");
    $("gameWaitingCard").classList.remove("hidden");
    $("gameWaitingNumber").textContent="學生編號 "+selectedStudentNumber;
    setStatus("gameWaitingStatus","等待教師確認加入…");
    listenForGameStart();
  }catch(e){
    setStatus("joinStatus","加入遊戲失敗：\n"+(e.message||e),"error");
    $("startBtn").disabled=false;
  }
}

async function prepareGameModel(){
  if(model)return;
  if(gameModelPromise)return gameModelPromise;
  gameModelPreparing=true;
  setStatus("gameWaitingStatus","教師已同意！正在準備 AI 模型，請等待遊戲開始。","success");
  gameModelPromise=(async()=>{
    await loadSelectedModel();
    const labels=getModelLabels();
    const missing=task.targetClasses.filter(x=>!labels.includes(x));
    if(missing.length)throw new Error("模型缺少類別："+missing.join("、"));
    buildPredictionUI(labels);
    setStatus("gameWaitingStatus","準備完成！等待教師按下「全員開始」。","success");
  })();
  try{await gameModelPromise}
  catch(e){model=null;setStatus("gameWaitingStatus","AI 模型準備失敗：\n"+(e.message||e),"error");throw e}
  finally{gameModelPreparing=false;gameModelPromise=null}
}

function listenForGameStart(){
  if(gamePlayerUnsub)gamePlayerUnsub();
  if(gameTaskUnsub)gameTaskUnsub();
  gamePlayerUnsub=gamePlayerRef.onSnapshot(snap=>{
    if(!snap.exists)return;
    const data=snap.data();gamePlayerStatus=data.status||"";gameRank=Number(data.rank||0);
    if(finished&&gameRank){
      $("rankDisplay").classList.remove("hidden");
      $("rankDisplay").textContent=`第 ${gameRank} 名`;
      $("completeIcon").textContent=gameRank===1?"🏆":gameRank===2?"🥈":gameRank===3?"🥉":"🎉";
      $("completeTitle").textContent=gameRank===1?"恭喜獲得第一名！":"尋物遊戲完成！";
    }
    if(data.status==="approved"){
      $("gameWaitingTitle").textContent="已通過教師同意";
      $("gameWaitingMessage").textContent="請留在此頁面，教師開始後會自動進入尋物畫面。";
      prepareGameModel().catch(()=>{});
    }else if(data.status==="rejected"){
      $("gameWaitingTitle").textContent="教師未同意加入";
      $("gameWaitingMessage").textContent="請重新載入遊戲並選擇其他學生編號。";
      setStatus("gameWaitingStatus","加入申請未通過。","error");
    }
    tryStartGame();
  });
  gameTaskUnsub=db.collection("tasks").doc(taskId).onSnapshot(snap=>{
    if(!snap.exists)return;
    task={...task,...snap.data()};
    if(task.gameStatus==="finished"&&!finished){
      if(gameStartedLocally){stopAll();finishTask()}else{
        $("gameWaitingTitle").textContent="遊戲已結束";
        setStatus("gameWaitingStatus","教師已結束這場遊戲。","error");
      }
      return;
    }
    tryStartGame();
  });
}

async function tryStartGame(){
  if(!isGameMode()||gameStartedLocally||task.gameStatus!=="active"||!["approved","playing"].includes(gamePlayerStatus))return;
  gameStartedLocally=true;
  $("gameWaitingTitle").textContent="遊戲開始！";
  setStatus("gameWaitingStatus","正在開啟相機，請準備尋找物品！","success");
  try{
    if(gameModelPromise)await gameModelPromise;
    await startTask();
  }catch(e){gameStartedLocally=false}
}

  if(task&&task.taskMode==="teaching"){

  }

  if(!selectedStudentNumber){
    setStatus("joinStatus","請先選擇學生編號。","error");
    return;
  }

  if(isGameMode()&&!["approved","playing"].includes(gamePlayerStatus)){
    setStatus("gameWaitingStatus","尚未取得教師同意，請繼續等待。","error");
    return;
  }

  if(isGameMode())shuffleGameTargetsForStudent();

  const studentName="學生 "+selectedStudentNumber;
  const studentCode=selectedStudentNumber;

  $("startBtn").disabled=true;
  setStatus("joinStatus","正在載入 AI 模型並建立作答紀錄…");

  try{
    if(!model)await loadSelectedModel();
    const labels=getModelLabels();
    const missing=task.targetClasses.filter(x=>!labels.includes(x));
    if(missing.length)throw new Error("模型缺少類別："+missing.join("、"));

    if(!isTeachingMode()){
      resultRef=await db.collection("taskResults").add({
        taskId,
        teacherId:task.teacherId||"",
        studentUid:auth.currentUser.uid,
        studentName,studentCode,
        projectType,
        targetClasses:task.targetClasses,
        completedClasses:[],
        incorrectClasses:[],
        progress:0,
        attempts:0,
        status:"inProgress",
        taskMode:task.taskMode||"task",
        gamePlayerId:isGameMode()?selectedStudentNumber:"",
        startedAt:firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }else{
      resultRef=null;
    }

    if(isGameMode()&&gamePlayerRef){
      await gamePlayerRef.update({
        status:"playing",
        startedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      gamePlayerStatus="playing";
    }

    currentIndex=0;completed=[];attempts=0;holdCount=0;finished=false;paused=false;taskSuccessAnimating=false;
    buildPredictionUI(labels);

    if(task.taskMode==="teaching"){
      $("normalTaskHeader").classList.add("hidden");
      $("teachingHeader").classList.remove("hidden");
      $("teachingResult").classList.add("hidden");
      $("holdSection").classList.add("hidden");
      $("itemList").classList.add("hidden");
      $("predictionList").classList.add("hidden");

      const cameraCard=document.querySelector(".teaching-camera-card");
      if(cameraCard && $("imageStage").parentElement!==cameraCard){
        cameraCard.appendChild($("imageStage"));
      }
    }else{
      $("normalTaskHeader").classList.remove("hidden");
      $("teachingHeader").classList.add("hidden");
      $("predictionList").classList.add("hidden");
      $("teachingResult").classList.add("hidden");
      $("holdSection").classList.add("hidden");
      $("itemList").classList.add("hidden");

      if(isAdvancedMode()){
        $("normalTargetCard").classList.add("hidden");
        $("advancedPromptCard").classList.remove("hidden");
      }else{
        $("normalTargetCard").classList.remove("hidden");
        $("advancedPromptCard").classList.add("hidden");
      }

      renderTask();
    }

    $("loadCard").classList.add("hidden");
    $("joinCard").classList.add("hidden");
    $("gameWaitingCard").classList.add("hidden");
    $("taskCard").classList.remove("hidden");

    await startSelectedProject();
  }catch(error){
    console.error(error);
    if(isGameMode()){
      gameStartedLocally=false;
      $("gameWaitingCard").classList.remove("hidden");
      setStatus("gameWaitingStatus","開始遊戲失敗：\n"+(error.message||error),"error");
    }else{
      setStatus("joinStatus","開始任務失敗：\n"+(error.message||error),"error");
    }
    $("startBtn").disabled=false;
  }
}

async function loadSelectedModel(){
  if((["teaching","advanced","game"].includes(task.taskMode))&&projectType!=="image"){
    throw new Error("目前教學模式、進階評量與多人遊戲僅支援 Teachable Machine 圖片專案。");
  }

  if(projectType==="image"){
    model=await tmImage.load(task.modelURL+"model.json",task.modelURL+"metadata.json");
  }else if(projectType==="pose"){
    model=await tmPose.load(task.modelURL+"model.json",task.modelURL+"metadata.json");
  }else if(projectType==="audio"){
    model=await tmAudio.load(task.modelURL+"model.json",task.modelURL+"metadata.json");
  }else{
    throw new Error("不支援的專案類型");
  }
}
function getModelLabels(){
  if(model.getClassLabels)return model.getClassLabels();
  if(model.wordLabels)return model.wordLabels();
  if(model.getLabels)return model.getLabels();
  const labels=metadata?.labels||metadata?.wordLabels||[];
  return labels;
}

function buildPredictionUI(labels){
  predictionRows={};
  $("predictionList").innerHTML=labels.map((name,i)=>`
    <div class="pred-row">
      <div class="pred-name">${escapeHtml(name)}</div>
      <div class="pred-bar"><div id="predFill_${i}" class="pred-fill"></div></div>
      <div id="predValue_${i}" class="pred-value">0%</div>
    </div>`).join("");
  labels.forEach((name,i)=>predictionRows[name]={fill:$("predFill_"+i),value:$("predValue_"+i)});
}

async function startImage(){
  stopImage();

  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    throw new Error("此瀏覽器不支援相機功能");
  }

  const video=$("imageVideo");
  $("imageOverlay").textContent="正在開啟相機…";

  const preferredConstraints={
    video:{
      facingMode:{ideal:facingMode},
      width:{ideal:640},
      height:{ideal:480},
      frameRate:{ideal:12,max:15}
    },
    audio:false
  };

  try{
    imageStream=await navigator.mediaDevices.getUserMedia(preferredConstraints);
  }catch(firstError){
    console.warn("指定鏡頭開啟失敗，改用預設鏡頭",firstError);

    imageStream=await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:false
    });
  }

  video.srcObject=imageStream;

  await new Promise((resolve,reject)=>{
    if(video.readyState>=1&&video.videoWidth>0){
      resolve();
      return;
    }

    const timer=setTimeout(()=>{
      reject(new Error("相機畫面載入逾時"));
    },10000);

    video.onloadedmetadata=()=>{
      clearTimeout(timer);
      resolve();
    };
  });

  await video.play();

  lastImageOverlayText="";
  imageStableClass="";
  imageStableCount=0;
  $("imageStage").classList.remove("hidden");
  $("imageOverlay").textContent="等待相機畫面…";
  setStatus(
    "recognitionStatus",
    task&&task.taskMode==="teaching"
      ?"教學模式相機已啟動，請將物品放入框內。"
      :"相機已啟動，請尋找指定物品。",
    "success"
  );

  $("captureBtn").classList.remove("hidden");

  if(isTeachingMode()){
    $("imageOverlay").textContent="請將物品放入框內，再按「拍照辨識」";
    lastImageOverlayText=$("imageOverlay").textContent;
    setStatus("recognitionStatus","教學模式相機已啟動，請按「拍照辨識」。","success");
  }else{
    $("imageOverlay").textContent="請將物品放入框內，再按「拍照辨識」";
    lastImageOverlayText=$("imageOverlay").textContent;
    setStatus(
      "recognitionStatus",
      isAdvancedMode()
        ?"相機已啟動，請聽語音說明後拍照辨識。"
        :"相機已啟動，請按「拍照辨識」。",
      "success"
    );

    if(isAdvancedMode()){
      prepareAdvancedPrompt(true);
    }
  }
}
async function captureAndRecognize(){
  if(
    projectType!=="image" ||
    !imageStream ||
    finished ||
    paused ||
    photoRecognizing ||
    taskSuccessAnimating
  )return;

  photoRecognizing=true;
  $("captureBtn").disabled=true;
  $("imageOverlay").textContent="正在辨識照片…";
  lastImageOverlayText=$("imageOverlay").textContent;

  try{
    const video=$("imageVideo");
    const canvas=$("imageCanvas");
    const ctx=canvas.getContext("2d");

    if(video.readyState<2||!video.videoWidth){
      throw new Error("相機畫面尚未準備完成");
    }

    const side=Math.min(video.videoWidth,video.videoHeight);
    ctx.drawImage(
      video,
      (video.videoWidth-side)/2,
      (video.videoHeight-side)/2,
      side,
      side,
      0,
      0,
      224,
      224
    );

    const predictions=await model.predict(canvas);
    const sorted=[...predictions].sort((a,b)=>b.probability-a.probability);
    const top=sorted[0];
    const second=sorted[1]||{probability:0};
    if(isTeachingMode()){
      const confirmed=!!top &&
        top.probability>=task.threshold &&
        (top.probability-second.probability)>=0.10;

      if(confirmed){
        currentTeachingLabel=top.className;
        currentTeachingDescription=String(task.classDescriptions?.[top.className]||"").trim();
        const percent=Math.round(top.probability*100);

        $("teachingName").textContent=top.className;
        $("teachingConfidence").textContent="信心值："+percent+"%";
        $("speakTeachingBtn").disabled=false;
        $("speakDescriptionBtn").disabled=!currentTeachingDescription;

        if($("teachingNameTop")){
          $("teachingNameTop").textContent=top.className;
        }
        if($("speakTeachingBtnTop")){
          $("speakTeachingBtnTop").disabled=false;
        }
        if($("speakDescriptionBtnTop")){
          $("speakDescriptionBtnTop").disabled=!currentTeachingDescription;
        }

        $("imageOverlay").textContent=`辨識結果：${top.className}｜${percent}%`;
        lastImageOverlayText=$("imageOverlay").textContent;
        flashTeachingNameCard();
      }else{
        currentTeachingLabel="";
        currentTeachingDescription="";
        $("teachingName").textContent="";
        $("teachingConfidence").textContent="";
        $("speakTeachingBtn").disabled=true;
        $("speakDescriptionBtn").disabled=true;

        if($("teachingNameTop")){
          $("teachingNameTop").textContent="";
        }
        if($("speakTeachingBtnTop")){
          $("speakTeachingBtnTop").disabled=true;
        }
        if($("speakDescriptionBtnTop")){
          $("speakDescriptionBtnTop").disabled=true;
        }

        $("imageOverlay").textContent="無法確定辨識，請重新拍照";
        lastImageOverlayText=$("imageOverlay").textContent;
      }

      photoRecognizing=false;
      $("captureBtn").disabled=false;
      return;
    }

    const target=task.targetClasses[currentIndex];

    const correct=!!top &&
      top.className===target &&
      top.probability>=task.threshold &&
      (top.probability-second.probability)>=0.10;

    if(correct){
      taskSuccessAnimating=true;
      const successText=`辨識成功：${top.className}`;
      $("imageOverlay").textContent=successText;
      lastImageOverlayText=successText;
      flashTaskResultBox();
      showCaptureFeedback("success","辨識成功");
      playTaskSuccessSound();

      setTimeout(async()=>{
        await completeCurrent(top.probability,canvas);
        taskSuccessAnimating=false;
        photoRecognizing=false;
        $("captureBtn").disabled=false;

        if(!finished){
          $("imageOverlay").textContent="請將下一個物品放入框內，再按「拍照辨識」";
          lastImageOverlayText=$("imageOverlay").textContent;
        }
      },850);
    }else{
      attempts++;
      showCaptureFeedback("failure","辨識失敗");
      playTaskErrorSound();

      if(resultRef&&target){
        try{
          await resultRef.update({
            attempts,
            incorrectClasses:firebase.firestore.FieldValue.arrayUnion(target),
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          });
        }catch(e){
          console.warn("辨識錯誤物品紀錄失敗",e);
        }
      }

      $("imageOverlay").textContent="辨識錯誤，請重新拍照";
      lastImageOverlayText=$("imageOverlay").textContent;
      setStatus(
        "recognitionStatus",
        isAdvancedMode()
          ?"辨識錯誤，請再聽一次語音說明後重新拍照。"
          :"辨識錯誤，請將指定物品放入框內後重新拍照。",
        "error"
      );

      setTimeout(()=>{
        if(!finished){
          $("imageOverlay").textContent="請將物品放入框內，再按「拍照辨識」";
          lastImageOverlayText=$("imageOverlay").textContent;
        }
        photoRecognizing=false;
        $("captureBtn").disabled=false;
      },850);
    }
  }catch(e){
    showCaptureFeedback("failure","辨識失敗");
    playTaskErrorSound();
    $("imageOverlay").textContent="拍照辨識失敗，請再試一次";
    lastImageOverlayText=$("imageOverlay").textContent;
    setStatus("recognitionStatus","拍照辨識失敗：\n"+e.message,"error");
    photoRecognizing=false;
    $("captureBtn").disabled=false;
  }
}

function stopImage(cancel=true){
  if(cancel&&imageRaf)clearTimeout(imageRaf);
  imageRaf=null;

  if(imageStream){
    imageStream.getTracks().forEach(t=>t.stop());
    imageStream=null;
  }

  const video=$("imageVideo");
  if(video){
    try{video.pause();}catch(e){}
    video.srcObject=null;
  }

  imagePredicting=false;
  imageStableClass="";
  imageStableCount=0;
}
function scheduleImageLoop(delay){
  if(finished||paused||!imageStream)return;
  if(imageRaf)clearTimeout(imageRaf);
  imageRaf=setTimeout(()=>imageLoop(),delay);
}

async function imageLoop(){
  if(finished||paused||!imageStream||imagePredicting)return;

  imagePredicting=true;
  let nextDelay=task&&task.taskMode==="teaching"
    ? IMAGE_TEACHING_INTERVAL
    : IMAGE_TASK_INTERVAL;

  try{
    const video=$("imageVideo");
    const canvas=$("imageCanvas");
    const ctx=canvas.getContext("2d");

    if(video.readyState>=2&&video.videoWidth){
      const side=Math.min(video.videoWidth,video.videoHeight);

      // 每次推論仍使用完整 224×224 模型輸入。
      ctx.drawImage(
        video,
        (video.videoWidth-side)/2,
        (video.videoHeight-side)/2,
        side,
        side,
        0,
        0,
        224,
        224
      );

      const predictions=await model.predict(canvas);
      const sorted=[...predictions].sort((a,b)=>b.probability-a.probability);
      const top=sorted[0];

      processPredictions(predictions,canvas);

      if(top){
        const percent=Math.round(top.probability*100);
        const second=sorted[1]||{probability:0};
        const confirmed=
          top.probability>=task.threshold &&
          (top.probability-second.probability)>=0.10;

        const overlayText=
          task&&task.taskMode==="teaching"
            ? (
                confirmed
                  ? `目前辨識：${top.className}｜${percent}%`
                  : "正在辨識…"
              )
            : (
                taskSuccessAnimating
                  ? `辨識成功：${top.className}`
                  : "正在辨識…"
              );

        if(overlayText!==lastImageOverlayText){
          $("imageOverlay").textContent=overlayText;
          lastImageOverlayText=overlayText;
        }

        if(top.className===imageStableClass&&top.probability>=0.90){
          imageStableCount++;
        }else{
          imageStableClass=top.className;
          imageStableCount=1;
        }

        // 教學模式名稱穩定後，減少重複辨識；一般任務仍維持較快速度。
        if(
          task&&task.taskMode==="teaching"&&
          imageStableCount>=4&&
          top.probability>=0.90
        ){
          nextDelay=IMAGE_TEACHING_STABLE_INTERVAL;
        }
      }
    }
  }catch(e){
    setStatus("recognitionStatus","圖片辨識錯誤：\n"+e.message,"error");
    nextDelay=500;
  }finally{
    imagePredicting=false;
    scheduleImageLoop(nextDelay);
  }
}

async function startPose(){
  // Pose 改用 getUserMedia 控制前後鏡頭，
  // 再將影像提供給 Teachable Machine Pose 模型。
  if(poseVideoStream){
    poseVideoStream.getTracks().forEach(t=>t.stop());
    poseVideoStream=null;
  }

  if(poseRaf){
    cancelAnimationFrame(poseRaf);
    poseRaf=null;
  }

  if(!poseVideo){
    poseVideo=document.createElement("video");
    poseVideo.autoplay=true;
    poseVideo.muted=true;
    poseVideo.playsInline=true;
  }

  poseVideoStream=await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:{ideal:facingMode},
      width:{ideal:640},
      height:{ideal:480},
      frameRate:{ideal:12,max:15}
    },
    audio:false
  });

  poseVideo.srcObject=poseVideoStream;
  await poseVideo.play();

  const canvas=$("poseCanvas");
  canvas.width=420;
  canvas.height=420;
  poseCtx=canvas.getContext("2d");

  lastPoseOverlayText="";
  poseStableClass="";
  poseStableCount=0;
  setStatus("recognitionStatus","姿勢相機已啟動，請讓全身進入框內。","success");
  poseLoop();
}

function schedulePoseLoop(delay){
  if(finished||paused||!poseVideo||!poseVideoStream)return;
  if(poseRaf)clearTimeout(poseRaf);
  poseRaf=setTimeout(()=>poseLoop(),delay);
}

async function poseLoop(){
  if(finished||paused||!poseVideo||!poseVideoStream||posePredicting)return;

  posePredicting=true;
  let nextDelay=POSE_INTERVAL;

  try{
    const canvas=$("poseCanvas");
    poseCtx.clearRect(0,0,canvas.width,canvas.height);

    if(facingMode==="user"){
      poseCtx.save();
      poseCtx.translate(canvas.width,0);
      poseCtx.scale(-1,1);
      poseCtx.drawImage(poseVideo,0,0,canvas.width,canvas.height);
      poseCtx.restore();
    }else{
      poseCtx.drawImage(poseVideo,0,0,canvas.width,canvas.height);
    }

    const {pose,posenetOutput}=await model.estimatePose(canvas);
    const predictions=await model.predict(posenetOutput);

    drawPose(pose);
    processPredictions(predictions,canvas);

    const top=[...predictions].sort((a,b)=>b.probability-a.probability)[0];

    if(top){
      const overlayText=
        `目前姿勢：${top.className}｜${Math.round(top.probability*100)}%`;

      if(overlayText!==lastPoseOverlayText){
        $("poseOverlay").textContent=overlayText;
        lastPoseOverlayText=overlayText;
      }

      if(top.className===poseStableClass&&top.probability>=0.90){
        poseStableCount++;
      }else{
        poseStableClass=top.className;
        poseStableCount=1;
      }

      // 姿勢穩定時稍微降低推論頻率，動作改變後立即恢復。
      if(poseStableCount>=5&&top.probability>=0.90){
        nextDelay=POSE_STABLE_INTERVAL;
      }
    }
  }catch(e){
    setStatus("recognitionStatus","姿勢辨識錯誤：\n"+e.message,"error");
    nextDelay=500;
  }finally{
    posePredicting=false;
    schedulePoseLoop(nextDelay);
  }
}

function drawPose(pose){
  if(!poseCtx || !poseVideo)return;

  const canvas=$("poseCanvas");

  poseCtx.clearRect(0,0,canvas.width,canvas.height);

  // 顯示相機畫面
  if(facingMode==="user"){
    poseCtx.save();
    poseCtx.translate(canvas.width,0);
    poseCtx.scale(-1,1);
    poseCtx.drawImage(
      poseVideo,
      0,
      0,
      canvas.width,
      canvas.height
    );
    poseCtx.restore();
  }else{
    poseCtx.drawImage(
      poseVideo,
      0,
      0,
      canvas.width,
      canvas.height
    );
  }

  // 顯示 Teachable Machine Pose 骨架
  if(pose){
    tmPose.drawKeypoints(
      pose.keypoints,
      0.5,
      poseCtx
    );

    tmPose.drawSkeleton(
      pose.keypoints,
      0.5,
      poseCtx
    );
  }
}

async function startAudio(){
  audioListening=true;
  setStatus("recognitionStatus","麥克風已啟動，請發出指定聲音。","success");
  await model.listen(result=>{
    if(finished||paused||!audioListening)return;
    const labels=getModelLabels();
    const predictions=labels.map((className,i)=>({className,probability:result.scores[i]||0}));
    processPredictions(predictions,null);
    const top=[...predictions].sort((a,b)=>b.probability-a.probability)[0];
    $("audioOverlay").textContent=`目前辨識：${top.className}｜${Math.round(top.probability*100)}%`;
  },{
    includeSpectrogram:true,
    probabilityThreshold:0,
    invokeCallbackOnNoiseAndUnknown:true,
    overlapFactor:0.50
  });
}
function stopAudio(){
  audioListening=false;
  if(model&&model.stopListening)model.stopListening();
}

function processPredictions(predictions,evidenceCanvas){
  predictions.forEach(item=>{
    const row=predictionRows[item.className];
    if(row){
      const pct=Math.round(item.probability*100);
      row.fill.style.width=pct+"%";
      row.value.textContent=pct+"%";
    }
  });

  const sorted=[...predictions].sort((a,b)=>b.probability-a.probability);
  const top=sorted[0],second=sorted[1]||{probability:0};

  if(task.taskMode==="teaching"){
    if(top){
      const teachingPercent=Math.round(top.probability*100);
      const isConfirmed=
        top.probability>=task.threshold &&
        (top.probability-second.probability)>=0.10;

      if(isConfirmed){
        currentTeachingLabel=top.className;
        currentTeachingDescription=String(task.classDescriptions?.[top.className]||"").trim();

        if(
          top.className!==lastTeachingClass ||
          teachingPercent!==lastTeachingPercent
        ){
          $("teachingName").textContent=top.className;
          $("teachingConfidence").textContent="信心值："+teachingPercent+"%";
          $("speakTeachingBtn").disabled=false;
          $("speakDescriptionBtn").disabled=!currentTeachingDescription;

          if($("teachingNameTop")){
            $("teachingNameTop").textContent=top.className;
          }
          if($("speakTeachingBtnTop")){
            $("speakTeachingBtnTop").disabled=false;
          }
          if($("speakDescriptionBtnTop")){
            $("speakDescriptionBtnTop").disabled=!currentTeachingDescription;
          }

          lastTeachingClass=top.className;
          lastTeachingPercent=teachingPercent;
        }

        if(top.className!==lastFlashedTeachingClass){
          flashTeachingNameCard();
          lastFlashedTeachingClass=top.className;
        }

        setStatus(
          "recognitionStatus",
          `辨識結果：${top.className}`,
          "success"
        );
      }else{
        currentTeachingLabel="";
        $("teachingName").textContent="";
        $("teachingConfidence").textContent="";
        $("speakTeachingBtn").disabled=true;

        if($("teachingNameTop")){
          $("teachingNameTop").textContent="";
        }
        if($("speakTeachingBtnTop")){
          $("speakTeachingBtnTop").disabled=true;
        }

        lastTeachingClass="";
        lastTeachingPercent=-1;
        lastFlashedTeachingClass="";
        setStatus("recognitionStatus","正在確認辨識結果。");
      }
    }
    return;
  }

  const target=task.targetClasses[currentIndex];

  const success=
    top.className===target &&
    top.probability>=task.threshold &&
    (top.probability-second.probability)>=0.10;

  if(success)holdCount++;
  else{
    if(top.probability>=task.threshold&&top.className!==target)attempts++;
    holdCount=0;
  }

  const required=task.requiredConsecutiveFrames;
  $("holdText").textContent=`${holdCount} / ${required}`;
  $("holdFill").style.width=Math.min(100,holdCount/required*100)+"%";

  if(holdCount>=required&&!taskSuccessAnimating){
    holdCount=0;
    taskSuccessAnimating=true;

    if(projectType==="image"){
      const successText=`辨識成功：${top.className}`;
      $("imageOverlay").textContent=successText;
      lastImageOverlayText=successText;
      flashTaskResultBox();
      showCaptureFeedback("success","辨識成功");
      playTaskSuccessSound();

      setTimeout(async()=>{
        await completeCurrent(top.probability,evidenceCanvas);
        taskSuccessAnimating=false;

        if(!finished){
          $("imageOverlay").textContent="正在辨識…";
          lastImageOverlayText="正在辨識…";
        }
      },850);
    }else{
      playTaskSuccessSound();
      completeCurrent(top.probability,evidenceCanvas);
      taskSuccessAnimating=false;
    }
  }
}

async function claimGameRank(){
  if(!isGameMode()||!gamePlayerRef)return 0;
  const counterRef=db.collection("tasks").doc(taskId).collection("gameControl").doc("ranking");
  try{
    const rank=await db.runTransaction(async tx=>{
      const counterSnap=await tx.get(counterRef);
      const playerSnap=await tx.get(gamePlayerRef);
      if(!playerSnap.exists)throw new Error("找不到遊戲排名資料");
      const oldRank=Number(playerSnap.data().rank||0);
      if(oldRank)return oldRank;
      const nextRank=Number(counterSnap.exists?counterSnap.data().count||0:0)+1;
      tx.set(counterRef,{count:nextRank});
      tx.update(gamePlayerRef,{
        status:"completed",rank:nextRank,
        completedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      return nextRank;
    });
    gameRank=rank;
    if(resultRef)await resultRef.update({gameRank:rank});
    return rank;
  }catch(e){
    console.error("遊戲名次寫入失敗",e);
    try{
      await gamePlayerRef.update({status:"completed",completedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(ignore){}
    return 0;
  }
}

async function completeCurrent(confidence,evidenceCanvas){
  if(finished)return;
  const item=task.targetClasses[currentIndex];

  completed.push(item);
  currentIndex++;
  renderTask();

  const evidence={
    targetClass:item,
    confidence,
    projectType,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  if(evidenceCanvas&&projectType!=="audio"){
    evidence.photoDataURL=evidenceCanvas.toDataURL("image/jpeg",0.42);
  }

  if(!isTeachingMode()&&resultRef){
    try{
      await resultRef.collection("evidence").add(evidence);
      const progress=Math.round(completed.length/task.targetClasses.length*100);
      await resultRef.update({
        completedClasses:[...completed],
        progress,
        attempts,
        status:currentIndex>=task.targetClasses.length?"completed":"inProgress",
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        ...(currentIndex>=task.targetClasses.length?{completedAt:firebase.firestore.FieldValue.serverTimestamp()}:{})
      });
    }catch(e){
      console.error("回傳紀錄失敗",e);
      setStatus("recognitionStatus","辨識成功，但 Firebase 紀錄失敗：\n"+e.message,"error");
    }
  }

  if(currentIndex>=task.targetClasses.length){
    if(isGameMode())await claimGameRank();
    finishTask();
  }else{
    if(isAdvancedMode()){
      setStatus("recognitionStatus","答對了，請聽下一題語音說明。","success");
      prepareAdvancedPrompt(true);
    }else{
      setStatus("recognitionStatus",`已完成「${item}」，請進行下一項。`,"success");
    }
  }
}

function renderTask(){
  const total=task.targetClasses.length,done=completed.length;
  $("progressText").textContent=`${done} / ${total}`;
  $("progressFill").style.width=Math.round(done/total*100)+"%";
  $("currentTarget").textContent=isAdvancedMode()
    ? (currentIndex<total?"請聽語音題目":"全部完成")
    : (currentIndex<total?task.targetClasses[currentIndex]:"全部完成");

  $("speakEvaluationTargetBtn").disabled=
    isTeachingMode()||
    isAdvancedMode()||
    currentIndex>=total;
  $("itemList").innerHTML=task.targetClasses.map((x,i)=>`
    <div class="item ${i<done?"done":""}">
      <span>${i<done?"✓":i===currentIndex?"➜":"○"} ${escapeHtml(x)}</span>
      <span>${i<done?"完成":i===currentIndex?"進行中":"等待"}</span>
    </div>`).join("");
}

function finishTask(){
  finished=true;
  stopAll();
  $("taskCard").classList.add("hidden");
  $("gameWaitingCard").classList.add("hidden");
  $("completeCard").classList.remove("hidden");
  $("completeActions").classList.toggle("hidden",isTeachingMode()||isGameMode());
  const typeName={image:"圖片",audio:"音訊",pose:"姿勢"}[projectType];
  if(isGameMode()){
    $("completeIcon").textContent=gameRank===1?"🏆":gameRank===2?"🥈":gameRank===3?"🥉":"🎉";
    $("completeTitle").textContent=gameRank===1?"恭喜獲得第一名！":"尋物遊戲完成！";
    $("rankDisplay").classList.remove("hidden");
    $("rankDisplay").textContent=gameRank?`第 ${gameRank} 名`:"名次同步中";
    $("completeMessage").textContent="你已完成所有指定物品，名次也會同步顯示在教師端。";
  }else{
    $("completeIcon").textContent="🎉";
    $("completeTitle").textContent="任務完成！";
    $("rankDisplay").classList.add("hidden");
    $("completeMessage").textContent=isAdvancedMode()
      ? "已完成全部進階評量，結果已回傳教師端。"
      : `已完成全部${typeName}任務，結果已回傳教師端。`;
  }
}

async function repeatTask(){
  if(isTeachingMode())return;

  $("againBtn").disabled=true;
  $("endBtn").disabled=true;
  $("completeCard").classList.add("hidden");

  try{
    await startTask();
  }finally{
    $("againBtn").disabled=false;
    $("endBtn").disabled=false;
  }
}

function endTask(){
  stopAll();

  finished=false;
  paused=false;
  resultRef=null;
  currentIndex=0;
  completed=[];
  attempts=0;
  holdCount=0;
  taskSuccessAnimating=false;

  $("completeCard").classList.add("hidden");
  $("taskCard").classList.add("hidden");
  $("joinCard").classList.add("hidden");
  $("loadCard").classList.remove("hidden");

  $("loadStatus").textContent="等待任務資料。";
  $("loadStatus").className="status";
}

function stopAll(){
  taskSuccessAnimating=false;
  photoRecognizing=false;
  if($("captureBtn"))$("captureBtn").disabled=false;
  stopImage();
  if(poseRaf)clearTimeout(poseRaf);
  poseRaf=null;
  if(poseWebcam){try{poseWebcam.stop();}catch(e){} poseWebcam=null}
  if(poseVideoStream){
    poseVideoStream.getTracks().forEach(t=>t.stop());
    poseVideoStream=null;
  }
  if(poseVideo){
    try{poseVideo.pause();}catch(e){}
    poseVideo.srcObject=null;
  }
  posePredicting=false;
  poseStableClass="";
  poseStableCount=0;
  stopAudio();
}

async function togglePause(){
  paused=!paused;

  if(paused){
    stopAll();
    setStatus("recognitionStatus","辨識與鏡頭已暫停。");
  }else{
    setStatus("recognitionStatus","正在重新啟動辨識…","success");

    try{
      await startSelectedProject();
      setStatus("recognitionStatus","辨識已繼續。","success");
    }catch(e){
      paused=true;
      setStatus("recognitionStatus","無法重新啟動辨識：\n"+e.message,"error");
    }
  }
}

async function switchCamera(){
  facingMode=facingMode==="environment"?"user":"environment";

  if(projectType==="image"){
    await startImage();
    return;
  }

  if(projectType==="pose"){
    await startPose();
    return;
  }
}

$("speakTeachingBtn").onclick=speakTeachingLabel;
$("speakTeachingBtnTop").onclick=speakTeachingLabel;
$("speakDescriptionBtn").onclick=speakTeachingDescription;
$("speakDescriptionBtnTop").onclick=speakTeachingDescription;
$("repeatAdvancedPromptBtn").onclick=speakAdvancedPrompt;
$("speakEvaluationTargetBtn").onclick=speakEvaluationTarget;
$("loadBtn").onclick=loadTask;
$("startBtn").onclick=()=>isGameMode()?requestGameJoin():startTask();
$("switchBtn").onclick=switchCamera;
$("captureBtn").onclick=captureAndRecognize;
$("againBtn").onclick=repeatTask;
$("endBtn").onclick=endTask;

document.addEventListener("visibilitychange",async()=>{
  if(document.hidden){
    if(!finished&&task&&!paused){
      pageAutoPaused=true;
      stopAll();
    }
    return;
  }

  if(pageAutoPaused&&!finished&&task&&!paused){
    pageAutoPaused=false;

    try{
      await startSelectedProject();
    }catch(e){
      setStatus(
        "recognitionStatus",
        "回到頁面後無法重新啟動相機：\n"+e.message,
        "error"
      );
    }
  }
});

window.addEventListener("pagehide",()=>{stopAll();stopGameListeners()});
window.addEventListener("freeze",stopAll);
window.addEventListener("beforeunload",()=>{stopAll();stopGameListeners()});

taskId=new URLSearchParams(location.search).get("task")||"";
$("taskIdInput").value=taskId;
if(taskId)loadTask();
</script>
